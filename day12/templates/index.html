<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LLM Agent Chat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Модальное окно для создания пользователя -->
<div id="createUserModal" class="modal">
    <div class="modal-content">
        <h2>👤 Создать пользователя</h2>
        <label for="userNameInput">Имя пользователя:</label>
        <input type="text" id="userNameInput" placeholder="Введите имя">
        <label for="preferencesFileInput">Файл предпочтений (опционально):</label>
        <input type="file" id="preferencesFileInput" accept=".md">
        <div class="modal-buttons">
            <button class="cancel-btn" onclick="closeCreateUserModal()">Отмена</button>
            <button onclick="createUser()">Создать</button>
        </div>
    </div>
</div>

<!-- Модальное окно для создания агента -->
<div id="createAgentModal" class="modal">
    <div class="modal-content">
        <h2>🤖 Создать агента</h2>
        <label for="agentNameInput">Имя агента:</label>
        <input type="text" id="agentNameInput" placeholder="Введите имя агента">
        <div class="modal-buttons">
            <button class="cancel-btn" onclick="closeCreateAgentModal()">Отмена</button>
            <button onclick="createAgent()">Создать</button>
        </div>
    </div>
</div>

<!-- Основной контейнер чата -->
<div class="chat-container">
    <!-- Шапка -->
    <div class="chat-header">
        <div class="header-left">
            <span>🤖 LLM Agent</span>
            <span class="agent-id" id="agentIdLabel">загрузка...</span>
        </div>
        <div class="user-controls">
            <select id="userSelect" class="user-select" onchange="switchUser(this.value)">
                <!-- Заполняется через JS -->
            </select>
            <button class="btn-small btn-success-small" onclick="showCreateUserModal()" title="Создать пользователя">+</button>
            <button class="btn-small btn-danger-small" onclick="deleteCurrentUser()" title="Удалить пользователя">✕</button>
        </div>
    </div>

    <!-- Панель управления агентами -->
    <div class="agent-controls">
        <div class="agent-controls-left">
            <label for="agentSelect">🤖 Агент:</label>
            <select id="agentSelect" class="agent-select" onchange="switchAgent(this.value)">
                <!-- Заполняется через JS -->
            </select>
            <button class="btn-small btn-success-small" onclick="showCreateAgentModal()" title="Создать агента">+</button>
            <button class="btn-small btn-danger-small" onclick="deleteCurrentAgent()" title="Удалить агента">✕</button>
            <span class="current-agent-label" id="currentAgentDisplay">🤖 default</span>
        </div>
        <button class="memory-btn" onclick="toggleWorkingMemory()" title="Рабочая память">
            🧠 Память <span class="badge" id="workingMemoryBadge">0</span>
        </button>
    </div>

    <!-- Панель рабочей памяти -->
    <div id="workingMemoryPanel" class="working-memory-panel" style="display:none;">
        <div class="memory-header">
            <span>🧠 Рабочая память (сводки завершённых диалогов)</span>
            <button class="btn-small btn-danger-small" onclick="clearWorkingMemory()" title="Очистить память">🗑️ Очистить</button>
        </div>
        <div id="workingMemoryContent" class="memory-content">
            <div class="empty-memory">Загрузка...</div>
        </div>
    </div>

    <!-- Область сообщений -->
    <div class="chat-messages" id="chatMessages">
        <div class="message assistant">
            <div class="message-bubble">Добро пожаловать! Отправьте сообщение, чтобы начать диалог.</div>
        </div>
    </div>

    <!-- Область ввода -->
    <div class="input-area">
        <textarea id="messageInput" rows="1" placeholder="Введите сообщение..." onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
        <button id="sendBtn" onclick="sendMessage()">Отправить</button>
        <button id="resetBtn" class="reset-btn" onclick="resetChat()">Очистить</button>
    </div>
</div>

<script src="/static/chat.js"></script>
</body>
</html>
